name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - data-ingestion
          - pool-detection
          - pool-design
          - contact-enrichment
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd src/${{ matrix.service }}
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: |
          cd src/${{ matrix.service }}
          ruff check .

      - name: Test
        run: |
          cd src/${{ matrix.service }}
          pytest -v --tb=short
