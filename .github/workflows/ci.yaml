name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd functions
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: |
          cd functions
          ruff check .

      - name: Test
        run: |
          cd functions
          pytest tests/ -v --tb=short

  validate-bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Validate Bicep
        run: az bicep build --file infra/main.bicep

  validate-arm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate ARM template
        run: |
          python -c "import json; json.load(open('marketplace/arm/mainTemplate.json'))"
          python -c "import json; json.load(open('marketplace/ui/createUiDefinition.json'))"
