name: Deploy Functions

on:
  push:
    tags: ["v*"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --template-file infra/main.bicep \
            --parameters attomApiKey=${{ secrets.ATTOM_API_KEY }} \
                         bingMapsKey=${{ secrets.BING_MAPS_KEY }} \
                         dbPassword=${{ secrets.DB_PASSWORD }}

      - name: Install func tools
        run: npm install -g azure-functions-core-tools@4

      - name: Deploy functions
        run: |
          cd functions
          pip install -r requirements.txt
          func azure functionapp publish ${{ vars.FUNCTION_APP_NAME }}

  package-marketplace:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - name: Package marketplace artifact
        run: |
          cd marketplace
          zip -r ../azl-pools-marketplace-${{ github.ref_name }}.zip arm/ ui/ manifest.json

      - uses: actions/upload-artifact@v4
        with:
          name: marketplace-package
          path: azl-pools-marketplace-*.zip
