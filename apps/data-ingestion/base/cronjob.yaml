apiVersion: batch/v1
kind: CronJob
metadata:
  name: nightly-property-sync
  namespace: pool-prospect
spec:
  schedule: "0 2 * * *"  # 2 AM daily
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: sync
              image: azlpoolsacr.azurecr.io/data-ingestion:0.1.0 # {"$imagepolicy": "flux-system:data-ingestion"}
              command: ["python", "-m", "tasks", "sync-all-counties"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: db-credentials
                      key: url
                - name: ATTOM_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: api-keys
                      key: attom
              resources:
                requests:
                  cpu: 500m
                  memory: 512Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
          restartPolicy: OnFailure
