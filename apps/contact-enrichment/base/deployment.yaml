apiVersion: apps/v1
kind: Deployment
metadata:
  name: contact-enrichment
  namespace: pool-prospect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contact-enrichment
  template:
    metadata:
      labels:
        app: contact-enrichment
    spec:
      containers:
        - name: contact-enrichment
          image: azlpoolsacr.azurecr.io/contact-enrichment:0.1.0 # {"$imagepolicy": "flux-system:contact-enrichment"}
          ports:
            - containerPort: 8003
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: MELISSA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: api-keys
                  key: melissa
            - name: REDIS_URL
              value: redis://redis-svc.pool-prospect.svc:6379
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            periodSeconds: 10
