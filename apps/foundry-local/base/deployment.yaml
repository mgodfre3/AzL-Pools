apiVersion: apps/v1
kind: Deployment
metadata:
  name: foundry-local
  namespace: pool-prospect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: foundry-local
  template:
    metadata:
      labels:
        app: foundry-local
    spec:
      containers:
        - name: foundry-local
          image: azlpoolsacr.azurecr.io/foundry-local:latest # {"$imagepolicy": "flux-system:foundry-local"}
          ports:
            - containerPort: 5273
          env:
            - name: FOUNDRY_MODEL
              value: phi-4-mini
            - name: FOUNDRY_DEVICE
              value: cpu
          resources:
            requests:
              cpu: "4"
              memory: 12Gi
            limits:
              cpu: "8"
              memory: 24Gi
          volumeMounts:
            - name: model-cache
              mountPath: /root/.foundry
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 5273
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 5273
            initialDelaySeconds: 120
            periodSeconds: 30
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: foundry-model-pvc
