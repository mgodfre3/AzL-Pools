apiVersion: apps/v1
kind: Deployment
metadata:
  name: pool-design
  namespace: pool-prospect
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pool-design
  template:
    metadata:
      labels:
        app: pool-design
    spec:
      containers:
        - name: pool-design
          image: azlpoolsacr.azurecr.io/pool-design:0.1.0 # {"$imagepolicy": "flux-system:pool-design"}
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: url
            - name: FOUNDRY_LOCAL_URL
              value: http://foundry-local-svc.pool-prospect.svc:5273/v1
            - name: REDIS_URL
              value: redis://redis-svc.pool-prospect.svc:6379
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8002
            periodSeconds: 10
