apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: pool-prospect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          args: ["--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
